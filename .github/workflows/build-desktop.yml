name: Build Desktop Installer

on:
  push:
    branches: [feat/local-desktop-sqlite]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm install && npm run build
      - run: cd backend && pip install -r requirements.txt && pip install pyinstaller
      - run: cd backend && python -m PyInstaller ichiban-server.spec --clean --noconfirm
      - run: cd electron && npm install && npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: ichiban-setup-windows
          path: electron/dist/*.exe
          if-no-files-found: error
