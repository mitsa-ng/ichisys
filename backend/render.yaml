services:
  - type: web
    name: ichiban-api
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install --upgrade pip wheel setuptools && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SITE_URL
        sync: false
